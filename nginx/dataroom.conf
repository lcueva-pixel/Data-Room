# ══════════════════════════════════════════════════════════════
# NGINX - Data Room (Construex)
# Reverse Proxy: Frontend (Next.js) + Backend (NestJS) + HTTPS
# ══════════════════════════════════════════════════════════════
# Dominio: dataroom.construex.com
# Amazon Linux: /etc/nginx/conf.d/dataroom.conf
# Ubuntu: /etc/nginx/sites-available/dataroom
# ══════════════════════════════════════════════════════════════

# Rate limiting - protección básica contra abuso
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ──────────────────────────────────────────
# Redirección HTTP → HTTPS
# ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dataroom.construex.com;

    # Redireccionar todo el tráfico a HTTPS
    return 301 https://$server_name$request_uri;
}

# ──────────────────────────────────────────
# Servidor HTTPS Principal
# ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dataroom.construex.com;

    # ──────────────────────────────────────────
    # SSL/TLS Configuration (Let's Encrypt)
    # ──────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/dataroom.construex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dataroom.construex.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dataroom.construex.com/chain.pem;

    # SSL protocols y ciphers modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session cache
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ──────────────────────────────────────────
    # Seguridad - Headers
    # ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────
    # Tamaño máximo de request (uploads)
    # ──────────────────────────────────────────
    client_max_body_size 50M;

    # ──────────────────────────────────────────
    # FRONTEND - NextAuth routes (Puerto 3001)
    # /api/auth/* son rutas de Auth.js (Next.js)
    # EXCEPTO /api/auth/login que va al backend
    # Debe ir ANTES del bloque /api/ general
    # ──────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────
    # BACKEND - NestJS API (Puerto 3000)
    # Todas las rutas /api/* van al backend
    # ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (si se necesita en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────────────────
    # FRONTEND - Next.js (Puerto 3001)
    # Todo lo demás va al frontend
    # ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR en dev, no en prod pero no molesta)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ──────────────────────────────────────────
    # Next.js static files - cache agresivo
    # ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache de 1 año para archivos estáticos con hash
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Archivos estáticos públicos
    # ──────────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Logs
    # ──────────────────────────────────────────
    access_log /var/log/nginx/dataroom_access.log;
    error_log /var/log/nginx/dataroom_error.log;

    # ──────────────────────────────────────────
    # Gzip compression
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
