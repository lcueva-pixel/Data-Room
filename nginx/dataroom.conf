# ══════════════════════════════════════════════════════════════
# NGINX - Data Room (Construex)
# Reverse Proxy: Frontend (Next.js) + Backend (NestJS)
# ══════════════════════════════════════════════════════════════
# Copiar este archivo a: /etc/nginx/sites-available/dataroom
# Luego crear symlink:   ln -s /etc/nginx/sites-available/dataroom /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════

# Rate limiting - protección básica contra abuso
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;  # Acepta cualquier IP/hostname (sin dominio por ahora)

    # ──────────────────────────────────────────
    # Seguridad - Headers
    # ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────
    # Tamaño máximo de request (uploads)
    # ──────────────────────────────────────────
    client_max_body_size 50M;

    # ──────────────────────────────────────────
    # BACKEND - NestJS API (Puerto 3000)
    # Todas las rutas /api/* van al backend
    # ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (si se necesita en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Rate limit más estricto para login
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────
    # FRONTEND - Next.js (Puerto 3001)
    # Todo lo demás va al frontend
    # ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR en dev, no en prod pero no molesta)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ──────────────────────────────────────────
    # Next.js static files - cache agresivo
    # ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache de 1 año para archivos estáticos con hash
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Archivos estáticos públicos
    # ──────────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ──────────────────────────────────────────
    # Logs
    # ──────────────────────────────────────────
    access_log /var/log/nginx/dataroom_access.log;
    error_log /var/log/nginx/dataroom_error.log;

    # ──────────────────────────────────────────
    # Gzip compression
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
